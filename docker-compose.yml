services:
  db:
    image: postgres:16-alpine
    container_name: napraw-mnie-db
    environment:
      POSTGRES_DB: napraw_mnie
      POSTGRES_USER: napraw_mnie
      POSTGRES_PASSWORD: ${DB_PASSWORD:-napraw_mnie_secret_2024}
    volumes:
      - napraw-mnie-pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U napraw_mnie -d napraw_mnie"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: napraw-mnie-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://napraw_mnie:${DB_PASSWORD:-napraw_mnie_secret_2024}@db:5432/napraw_mnie
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  napraw-mnie-pgdata:
