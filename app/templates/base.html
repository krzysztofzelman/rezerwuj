<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ServiceHub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Automatyczne dodawanie tokenu CSRF do formularzy POST
    !function(){var e="csrf_token";function n(e){var n=document.cookie.match(new RegExp("(^| )"+e+"=([^;]+)"));return n?decodeURIComponent(n[2]):null}document.addEventListener("submit",function(t){var o=t.target;if(o.method&&"POST"===o.method.toUpperCase()){var r=n(e);if(r){var c=r.split(".")[0];if(c){var a=document.createElement("input");a.type="hidden",a.name="_csrf_token",a.value=c,o.appendChild(a)}}}},!0)}();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
