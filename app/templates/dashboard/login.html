{% extends "base.html" %}
{% block title %}Logowanie — Napraw Mnie{% endblock %}
{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-tools text-primary display-4"></i>
                <h1 class="h4 mt-2">Napraw Mnie</h1>
                <p class="text-muted small">Panel usługodawcy</p>
            </div>

            {% if error %}
                <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="alert alert-success py-2 small">{{ success }}</div>
            {% endif %}

            <form method="POST" action="/auth/logowanie" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label small">Adres e-mail</label>
                    <input type="email" class="form-control" id="email" name="email" required
                           placeholder="jan@example.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label small">Hasło</label>
                    <input type="password" class="form-control" id="password" name="password" required
                           placeholder="••••••••">
                    <div class="mt-1 text-end">
                        <a href="/auth/reset-hasla" class="small text-decoration-none">Nie pamiętasz hasła?</a>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Zaloguj się</button>
            </form>

            <p class="text-center mt-3 mb-0 small">
                Nie masz jeszcze konta?
                <a href="/auth/rejestracja">Zarejestruj się</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
