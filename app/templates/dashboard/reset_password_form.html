{% extends "base.html" %}
{% block title %}Ustaw nowe hasło — Napraw Mnie{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-key display-4 text-primary"></i>
                <h1 class="h4 mt-2">Ustaw nowe hasło</h1>
                <p class="text-muted small">Wpisz nowe hasło dla swojego konta.</p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    {% if error %}
                        <div class="alert alert-danger py-2 small">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/auth/reset-hasla/{{ token }}" novalidate>
                        <div class="mb-3">
                            <label for="password" class="form-label small">Nowe hasło</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   required minlength="8" placeholder="Co najmniej 8 znaków" autocomplete="new-password">
                            <div class="form-text small text-muted">Minimum 8 znaków</div>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label small">Powtórz hasło</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                   required minlength="8" placeholder="Powtórz nowe hasło" autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-lg"></i> Zmień hasło
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/auth/logowanie" class="text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Powrót do logowania
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
