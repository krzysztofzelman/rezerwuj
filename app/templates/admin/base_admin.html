<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — ServiceHub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin">
                <i class="bi bi-shield-lock"></i> Admin — ServiceHub
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">
                            <i class="bi bi-people"></i> Użytkownicy
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-arrow-left"></i> Powrót do panelu
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link small text-white-50">
                            <i class="bi bi-person-circle"></i> {{ provider.name }}
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/auth/wyloguj">
                            <i class="bi bi-box-arrow-right"></i> Wyloguj
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% if success %}
            <div class="alert alert-success py-2 small">{{ success }}</div>
        {% endif %}
        {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        {% block admin_content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Automatyczne dodawanie tokenu CSRF do formularzy POST
    !function(){var e="csrf_token";function n(e){var n=document.cookie.match(new RegExp("(^| )"+e+"=([^;]+)"));return n?decodeURIComponent(n[2]):null}document.addEventListener("submit",function(t){var o=t.target;if(o.method&&"POST"===o.method.toUpperCase()){var r=n(e);if(r){var c=r.split(".")[0];if(c){var a=document.createElement("input");a.type="hidden",a.name="_csrf_token",a.value=c,o.appendChild(a)}}}},!0)}();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
