# HTTP — przekierowanie na HTTPS
server {
    listen 80;
    server_name napraw.kzelman.pl;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name napraw.kzelman.pl;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/napraw.kzelman.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/napraw.kzelman.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy do aplikacji FastAPI (na hoście: port 8002)
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Statyczne pliki
    location /static/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
